name: Update Deep-Sync News Wire

on:
  schedule:
    # Runs every day at 06:00 UTC. Adjust the cron if you want a different time/frequency.
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # adds a "Run workflow" button in the Actions tab, for manual runs / testing

permissions:
  contents: write         # needed so the workflow can commit data/news.json back to the repo

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate news and open calls
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-news.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "deepsync-news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/news.json data/calls.json
          git diff --cached --quiet || git commit -m "chore: update news wire $(date -u +%F)"
          git push
